---
# yaml-language-server: $schema=https://kubernetes-schemas.ergho.org/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: databases
  annotations:
    kyverno.io/ignore: "true"
spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:15.13@sha256:15673558381ed7cc29aead13b665001388c4493598434fb9317aa614c0111b75

  primaryUpdateStrategy: unsupervised

  storage:
    size: 35Gi
    storageClass: ceph-block

  monitoring:
    enablePodMonitor: true

  superuserSecret:
    name: postgres-superuser
  enableSuperuserAccess: true

  postgresql:
    parameters:
      max_connections: "600"
      max_slot_wal_keep_size: 10GB

  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      tags:
        retention: "30days"
      data:
        compression: gzip
      wal:
        compression: gzip
        maxParallel: 8
      destinationPath: s3://postgresql/v15/
      endpointURL: https://truenas.ergho.org:9000
      s3Credentials:
        accessKeyId:
          name: cloudnative-pg-s3
          key: S3_ACCESS_KEY
        secretAccessKey:
          name: cloudnative-pg-s3
          key: S3_SECRET_KEY

  externalClusters: []
