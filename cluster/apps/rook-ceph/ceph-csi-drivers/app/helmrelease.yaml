---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    operatorConfig:
      namespace: rook-ceph
      driverSpecDefaults:
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        enableMetadata: false
        generateOMapInfo: false
        fsGroupPolicy: File
        deployCsiAddons: false
        cephFsClientType: kernel
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical
          imagePullPolicy: IfNotPresent
        controllerPlugin:
          hostNetwork: true
          deploymentStrategy:
            type: Recreate
          replicas: 2
          priorityClassName: system-cluster-critical
          imagePullPolicy: IfNotPresent
    drivers:
      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        enableMetadata: false
        generateOMapInfo: false
        fsGroupPolicy: File
        deployCsiAddons: false
        cephFsClientType: kernel
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical
          resources:
            plugin:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
            registrar:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        controllerPlugin:
          replicas: 2
          priorityClassName: system-cluster-critical
          resources:
            attacher:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
            omapGenerator:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
            plugin:
              requests:
                memory: 512Mi
              limits:
                memory: 1Gi
            provisioner:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
            resizer:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
            snapshotter:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        enableMetadata: false
        generateOMapInfo: false
        fsGroupPolicy: File
        deployCsiAddons: false
        cephFsClientType: kernel
        snapshotPolicy: volumeGroupSnapshot
        kernelMountOptions:
          ms_mode: prefer-crc
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical
          resources:
            plugin:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
            registrar:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        controllerPlugin:
          replicas: 2
          priorityClassName: system-cluster-critical
          resources:
            attacher:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
            plugin:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
            provisioner:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
            resizer:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
            snapshotter:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
      nfs:
        enabled: false
      nvmeof:
        enabled: false
